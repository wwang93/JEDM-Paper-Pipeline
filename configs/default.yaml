project_name: JEDM-Paper-Pipeline

paths:
  raw_srt_dir: data/raw/subtitles_srt
  raw_txt_dir: data/raw/transcripts_txt
  coref_txt_dir: data/interim/coref_txt
  ner_txt_dir: data/interim/ner_txt
  gold_standard_dir: data/external/gold_standard
  ner_validation_dir: data/external/ner_validation
  topic_results_dir: data/results/rq3_topic_modeling

download:
  playlist_url: https://www.youtube.com/playlist?list=PL8dPuuaLjXtMwmepBjTSG593eG7ObzO7s
  subtitle_lang: en
  subtitle_format: srt

llm:
  model: gpt-4o
  max_chars: 2000
  sleep_seconds: 0.5
  max_retries: 3
  skip_existing: true

rq1:
  human_key: Human
  compare_keys:
    - ASR_Whisper
    - ASR_Ytdlp
    - ASR_Vosk
    - ASR_Otter
    - ASR_TurboScibe

rq3:
  num_topics: 5
